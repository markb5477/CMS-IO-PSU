# Load dashboard JSON on startup. Each provider maps a subfolder of
# /var/lib/grafana/dashboards to its own Grafana folder, so the PSU and BER
# views stay separate. Add a JSON to the matching subfolder to extend a view.
apiVersion: 1

providers:
  - name: cpx
    orgId: 1
    folder: CPX PSU
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/cpx
      foldersFromFilesStructure: false

  - name: bert
    orgId: 1
    folder: OT Module BER
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/bert
      foldersFromFilesStructure: false
