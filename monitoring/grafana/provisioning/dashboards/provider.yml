# Load any dashboard JSON found in /var/lib/grafana/dashboards on startup.
apiVersion: 1

providers:
  - name: cpx
    orgId: 1
    folder: CPX PSU
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
