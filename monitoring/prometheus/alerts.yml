groups:
  - name: cpx_psu
    rules:
      - alert: CPXExporterDown
        expr: up{job="cpx_psu"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "cpx-exporter on cmsladdertest is not responding to scrapes"

      - alert: CPXInstrumentUnreachable
        expr: cpx_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Exporter is up but cannot talk to the CPX200DP (LAN cable? PSU mains?)"

      - alert: CPXOutputTripped
        expr: cpx_trip_overvoltage == 1 or cpx_trip_overcurrent == 1
        labels:
          severity: critical
        annotations:
          summary: "CPX200DP channel {{ $labels.channel }} has tripped (OVP/OCP)"

      - alert: CPXStuckInCurrentLimit
        expr: cpx_constant_current == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPX200DP channel {{ $labels.channel }} has been in constant-current mode for 5m (load drawing more than the limit)"

  - name: ot_bert
    rules:
      - alert: BERTExporterDown
        expr: up{job="bert_status"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "bert-exporter on cmsladdertest is not responding to scrapes"

      - alert: BERTLoggingStalled
        expr: bert_up == 1 and bert_last_sample_timestamp_seconds > 0 and (time() - bert_last_sample_timestamp_seconds) > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "BER log has not gained a new sample in >5m (continuous BER test stopped or hung?)"

      - alert: BERTNoFile
        expr: bert_up == 1 and bert_file_present == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "bert-exporter is running but found no bertContinuous.csv to follow (no run started, or wrong BERT_RESULTS_ROOT?)"

      - alert: BERTHighErrorRate
        expr: bert_bit_error_rate > 1e-6
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High bit error rate on board {{ $labels.board }} hybrid {{ $labels.hybrid }} line {{ $labels.line }}: {{ $value }}"
